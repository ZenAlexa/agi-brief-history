name: "\U0001F527 Script / Automation Bug / 脚本问题"
description: Report issues with automation scripts or GitHub Actions
title: "[Bug]: "
labels: ["bug", "automation"]
body:
  - type: markdown
    attributes:
      value: |
        Found an issue with the automation? Let us know! / 发现自动化脚本问题？请告诉我们！
  - type: dropdown
    id: component
    attributes:
      label: Component / 组件
      options:
        - "ArXiv digest script (arxiv-digest.py)"
        - "Leaderboard snapshot (fetch-leaderboard.py)"
        - "Submodule update (update-submodules.sh)"
        - "GitHub Actions workflow"
        - "Other / 其他"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Bug Description / 问题描述
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior / 期望行为
      description: What should have happened?
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / 日志
      description: Relevant error messages or logs
      render: shell
    validations:
      required: false
