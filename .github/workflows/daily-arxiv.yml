name: Daily ArXiv Digest

on:
  schedule:
    - cron: '17 3 * * *'  # 03:17 UTC daily
  workflow_dispatch:

permissions:
  contents: write

jobs:
  arxiv-digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate ArXiv digest
        run: python scripts/arxiv-digest.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add knowledge/tracking/arxiv/
          if git diff --cached --quiet; then
            echo "No new papers to commit"
          else
            git commit -m "chore: daily arxiv digest $(date -u +%Y-%m-%d)"
            git push
          fi
