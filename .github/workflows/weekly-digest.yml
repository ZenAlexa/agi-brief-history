name: Weekly Comprehensive Digest

on:
  schedule:
    - cron: '23 6 * * 1'  # 06:23 UTC Monday
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  weekly-digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compile weekly summary
        run: |
          WEEK=$(date -u +%Y-W%W)
          DIR="knowledge/tracking/weekly"
          mkdir -p "$DIR"

          # Aggregate daily arxiv digests from past week
          echo "# Weekly Summary — $WEEK" > "$DIR/${WEEK}-summary.md"
          echo "" >> "$DIR/${WEEK}-summary.md"
          echo "> Auto-compiled: $(date -u +%Y-%m-%d)" >> "$DIR/${WEEK}-summary.md"
          echo "" >> "$DIR/${WEEK}-summary.md"

          echo "## ArXiv Papers This Week" >> "$DIR/${WEEK}-summary.md"
          echo "" >> "$DIR/${WEEK}-summary.md"

          for f in knowledge/tracking/arxiv/$(date -u -d '7 days ago' +%Y-%m-)*.md knowledge/tracking/arxiv/$(date -u +%Y-%m-)*.md; do
            if [ -f "$f" ]; then
              echo "### $(basename "$f" .md)" >> "$DIR/${WEEK}-summary.md"
              # Extract paper titles only
              grep "^### [0-9]" "$f" >> "$DIR/${WEEK}-summary.md" 2>/dev/null || true
              echo "" >> "$DIR/${WEEK}-summary.md"
            fi
          done

          echo "## Submodule Status" >> "$DIR/${WEEK}-summary.md"
          echo "" >> "$DIR/${WEEK}-summary.md"
          echo "See latest leaderboard snapshot in this directory." >> "$DIR/${WEEK}-summary.md"

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add knowledge/tracking/weekly/
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "chore: weekly digest $(date -u +%Y-W%W)"
            git push
          fi
